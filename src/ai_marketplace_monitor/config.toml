#
# Toronto-focused presets
#
[region.toronto]
full_name = "Toronto"
radius = 10
city_name = ["Toronto, ON"]
search_city = ["toronto"]
currency = 'CAD'

[marketplace.facebook]
search_region = 'toronto'

[item.gpu16_pc]
search_phrases = [
    'gaming laptop PC AI desktop'
]
keywords = '(laptop OR notebook OR desktop OR pc OR computer) AND ("16g vram")'
ai_keywords = true
ai = 'ollama'
rating = 3
min_price = 100
max_price = 1600
description = 'Gaming laptop or desktop PC with at least 16GB VRAM, powered by a high-end GPU such as RTX 4080, RTX 4090, RTX 4070 Ti Super, RX 6800, RX 7800 XT, RX 7900 XT, or RX 7900 XTX.'
extra_prompt = '''
Pay special attention to:
- Make sure the vram of the GPU>=16G, don't care about the RAM.
- The GPU model must be one of: RTX 4080, RTX 4090, RTX 4070 Ti Super, RX 6800, RX 7800 XT, RX 7900 XT, RX 7900 XTX (or equivalent with 16GB+ VRAM).
- If the GPU model is not clearly stated or is a lesser model, rate it 1 or 2.
- Laptops are acceptable as long as the GPU meets the requirement.
- Bundles (e.g., with monitor or peripherals) are fine.
'''

[item.mac_32gb_ram]
search_phrases = [
    'macbook pro mac mini studio'
]
keywords = 'mac 32G'
ai_keywords = true
ai = 'ollama'
rating = 3
antikeywords = ['intel', 'core i5', 'core i7', 'core i9']
min_price = 100
max_price = 1600
description = 'Apple Mac computer (MacBook Pro, Mac Studio, Mac Mini, or iMac) with Apple Silicon chip (M1/M2/M3/M4 series) and at least 32GB unified memory.'
extra_prompt = '''
Pay special attention to:
- Must be Apple Silicon (M1, M2, M3, or M4 series). Intel Macs are not acceptable.
- Unified memory must be at least 32GB (32GB, 36GB, 48GB, 64GB, 96GB, or 128GB).
- If the memory size is not clearly mentioned, or is only 8GB or 16GB, rate it 1 or 2.
- Pro/Max/Ultra chip variants are preferred as they typically come with more memory.
'''


#
# AI configuration (LM Studio local server)
#
[ai.ollama]
provider = 'ollama'
base_url = '${AI_BASE_URL}'
api_key = '${AI_API_KEY}'
model = '${AI_MODEL}'

#
# Notifications
#
[notification.telegram]
telegram_token = '${TELEGRAM_BOT_TOKEN}'
telegram_chat_id = '${TELEGRAM_CHAT_ID}'

[user.me]
notify_with = 'telegram'
